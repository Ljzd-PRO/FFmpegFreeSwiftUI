name: Build macOS App

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  PROJECT: FFmpegFreeSwiftUI.xcodeproj
  APP_SCHEME: FFmpegFreeSwiftUI-Release
  TEST_SCHEME: FFmpegFreeSwiftUI-CommandOnlyTests
  CONFIGURATION: Release
  DERIVED_DATA: build/DerivedData
  APP_NAME: FFmpegFreeSwiftUI

jobs:
  build:
    name: Build FFmpegFreeSwiftUI
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show build environment
        run: |
          set -euo pipefail
          sw_vers
          xcodebuild -version
          swift --version
          xcodebuild -list -project "$PROJECT"

      - name: SwiftPM build
        run: |
          set -euo pipefail
          swift build

      - name: Command-only tests
        run: |
          set -euo pipefail
          swift run FFmpegFreeSwiftUITestRunner --mode command-only
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$TEST_SCHEME" \
            -configuration Debug \
            -destination 'platform=macOS' \
            test

      - name: Build Release app
        run: |
          set -euo pipefail
          rm -rf "$DERIVED_DATA"
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$APP_SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination 'platform=macOS' \
            -derivedDataPath "$DERIVED_DATA" \
            clean build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY=- \
            DEVELOPMENT_TEAM=

      - name: Package app
        id: package
        run: |
          set -euo pipefail
          APP_PATH="$DERIVED_DATA/Build/Products/$CONFIGURATION/$APP_NAME.app"
          test -d "$APP_PATH"

          ARTIFACT_DIR="build/artifacts"
          mkdir -p "$ARTIFACT_DIR"

          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$GITHUB_REF_TYPE" != "tag" ]]; then
            VERSION="${GITHUB_SHA::7}"
          fi

          ZIP_PATH="$ARTIFACT_DIR/${APP_NAME}-${VERSION}-macOS.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_PATH"

          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          echo "zip_name=$(basename "$ZIP_PATH")" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.zip_name }}
          path: ${{ steps.package.outputs.zip_path }}
          if-no-files-found: error
